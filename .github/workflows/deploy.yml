# =============================================================================
# DEPLOY → VPS.
#
# Модель: GitHub збирає образи і кладе їх у GHCR з тегом = git SHA. На VPS
# нічого не збирається (там немає ні місця, ні часу — і білд на проді означає,
# що прод лежить, поки npm тягне node_modules).
#
# ⚠️ ЗАПУСК ТІЛЬКИ ВРУЧНУ (workflow_dispatch). Автодеплой на push у main —
#    свідомо НЕ вмикаємо: синк прайсу ходить 4×/добу, і викатити зламану міграцію
#    посеред прогону — найдорожчий спосіб дізнатись про баг. Коли з'явиться
#    staging (ROADMAP), автодеплой поїде туди.
#
# ВІДКАТ:
#     git revert <коміт> && git push   → Run workflow ще раз
#   або без збірки взагалі: на VPS повернути infra/images.env на попередній
#   коміт (`git checkout HEAD~1 -- infra/images.env`) і `make prod-up` — образи
#   пінуються по sha256, тому попередня версія ще лежить у GHCR і піднімається
#   за секунди. Саме заради цього і потрібен пінінг по дайджесту.
# =============================================================================

name: Deploy

on:
  workflow_dispatch:
    inputs:
      run_migrations:
        description: "Застосувати міграції"
        type: boolean
        default: true

concurrency:
  group: deploy-production
  cancel-in-progress: false   # два деплої підряд не мають перетнутись на міграціях

env:
  REGISTRY: ghcr.io

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      backend_digest: ${{ steps.backend.outputs.digest }}
      frontend_digest: ${{ steps.frontend.outputs.digest }}
      caddy_digest: ${{ steps.caddy.outputs.digest }}
      postgres_digest: ${{ steps.postgres.outputs.digest }}
      has_frontend: ${{ steps.detect.outputs.frontend }}
      tag: sha-${{ github.sha }}

    steps:
      - uses: actions/checkout@v4

      - id: detect
        run: |
          if [ -f frontend/package.json ]; then
            echo "frontend=true" >> "$GITHUB_OUTPUT"
          else
            echo "frontend=false" >> "$GITHUB_OUTPUT"
            echo "::warning::frontend/ немає — образ фронту не збирається, на VPS лишиться попередній"
          fi

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Ім'я репо в GHCR має бути в нижньому регістрі — інакше push відлітає з 403.
      - id: repo
        run: echo "name=${GITHUB_REPOSITORY,,}" >> "$GITHUB_OUTPUT"

      - name: backend
        id: backend
        uses: docker/build-push-action@v6
        with:
          context: .
          file: infra/Dockerfile.backend
          push: true
          tags: ${{ env.REGISTRY }}/${{ steps.repo.outputs.name }}-backend:sha-${{ github.sha }}
          cache-from: type=gha,scope=backend
          cache-to: type=gha,mode=max,scope=backend

      - name: frontend
        id: frontend
        if: steps.detect.outputs.frontend == 'true'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: infra/Dockerfile.frontend
          push: true
          tags: ${{ env.REGISTRY }}/${{ steps.repo.outputs.name }}-frontend:sha-${{ github.sha }}
          # NEXT_PUBLIC_* вшиваються в бандл НА ЗБІРЦІ — тому домен приходить сюди.
          build-args: |
            NEXT_PUBLIC_SITE_URL=${{ vars.SITE_URL || 'https://complex.ua' }}
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,mode=max,scope=frontend

      - name: caddy (+ модуль rate-limit)
        id: caddy
        uses: docker/build-push-action@v6
        with:
          context: infra
          file: infra/Dockerfile.caddy
          push: true
          tags: ${{ env.REGISTRY }}/${{ steps.repo.outputs.name }}-caddy:sha-${{ github.sha }}
          cache-from: type=gha,scope=caddy
          cache-to: type=gha,mode=max,scope=caddy

      - name: postgres (+ pgBackRest)
        id: postgres
        uses: docker/build-push-action@v6
        with:
          context: .
          file: infra/backup/Dockerfile
          push: true
          tags: ${{ env.REGISTRY }}/${{ steps.repo.outputs.name }}-postgres:sha-${{ github.sha }}
          cache-from: type=gha,scope=postgres
          cache-to: type=gha,mode=max,scope=postgres

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment: production   # ← сюди вішається required reviewer, якщо треба апрув

    steps:
      - name: SSH-ключ
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          # known_hosts, а не StrictHostKeyChecking=no: інакше MITM між нами
          # і VPS отримує root на проді, і ми про це не дізнаємось.
          echo "${{ secrets.SSH_KNOWN_HOSTS }}" > ~/.ssh/known_hosts
          chmod 644 ~/.ssh/known_hosts

      - name: Деплой
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_USER: ${{ secrets.SSH_USER }}
          APP_DIR: ${{ vars.APP_DIR || '/opt/complex' }}
          REPO: ${{ github.repository }}
          SHA: ${{ github.sha }}
          RUN_MIGRATIONS: ${{ inputs.run_migrations }}
          HAS_FRONTEND: ${{ needs.build.outputs.has_frontend }}
          BACKEND_DIGEST: ${{ needs.build.outputs.backend_digest }}
          FRONTEND_DIGEST: ${{ needs.build.outputs.frontend_digest }}
          CADDY_DIGEST: ${{ needs.build.outputs.caddy_digest }}
          POSTGRES_DIGEST: ${{ needs.build.outputs.postgres_digest }}
        run: |
          set -euo pipefail

          ssh -o BatchMode=yes "${SSH_USER}@${SSH_HOST}" bash -euo pipefail -s <<REMOTE
          set -euo pipefail

          APP_DIR="${APP_DIR}"
          SHA="${SHA}"
          REPO_LC="\$(echo "${REPO}" | tr '[:upper:]' '[:lower:]')"
          REGISTRY="ghcr.io"
          TAG="sha-${SHA}"

          cd "\${APP_DIR}"

          # --- 1. Код (compose, Caddyfile, скрипти бекапу) рівно тієї версії,
          #        що й образи. Розсинхрон конфіга й образу — класика жанру. ---
          git fetch --quiet origin "${SHA}"
          git checkout --quiet --force "${SHA}"

          # --- 2. Пінимо образи по ДАЙДЖЕСТУ (не по тегу!) ------------------
          # Тег sha-… теоретично можна перезаписати; дайджест — ні. У images.env
          # їде рівно те, що щойно зібралось, і його видно в git-історії VPS.
          IMAGES=infra/images.env
          pin() {  # pin VAR image-name digest
            local var="\$1" name="\$2" digest="\$3"
            [ -n "\$digest" ] || { echo "  ~ \$var — не збирався, лишаю як є"; return 0; }
            local ref="\${REGISTRY}/\${REPO_LC}-\${name}:\${TAG}@\${digest}"
            sed -i "s|^\${var}=.*|\${var}=\${ref}|" "\$IMAGES"
            echo "  → \$var = \$ref"
          }

          pin BACKEND_IMAGE  backend  "${BACKEND_DIGEST}"
          pin CADDY_IMAGE    caddy    "${CADDY_DIGEST}"
          pin POSTGRES_IMAGE postgres "${POSTGRES_DIGEST}"
          if [ "${HAS_FRONTEND}" = "true" ]; then
            pin FRONTEND_IMAGE frontend "${FRONTEND_DIGEST}"
          fi

          sed -i "s|^GIT_SHA=.*|GIT_SHA=\${SHA}|" .env || true

          COMPOSE="docker compose --env-file .env --env-file infra/images.env -f infra/docker-compose.yml"

          # --- 3. Витягуємо образи ДО зупинки чогось. Якщо GHCR лежить —
          #        падаємо тут, зі старим стеком, що працює. ------------------
          \$COMPOSE pull --quiet

          # --- 4. Міграції ---------------------------------------------------
          # lock_timeout=5s: якщо міграція не може взяти ACCESS EXCLUSIVE за 5 с
          # (хтось читає таблицю), вона ПАДАЄ, а не стає в чергу. Черга на
          # ACCESS EXCLUSIVE блокує геть усі наступні запити до таблиці — тобто
          # «повільна міграція» перетворюється на «магазин лежить».
          # Впала → перезапускаєш деплой у тихішу хвилину. Це дешево.
          if [ "${RUN_MIGRATIONS}" = "true" ]; then
            echo "--- migrate (lock_timeout=5s)"
            \$COMPOSE run --rm \
              -e PGOPTIONS="-c lock_timeout=5s" \
              web python manage.py migrate --noinput
          else
            echo "--- міграції пропущено (за запитом)"
          fi

          # --- 5. Піднімаємо ---------------------------------------------------
          # Контейнери перестворюються тільки там, де змінився образ/конфіг.
          echo "--- up"
          \$COMPOSE up -d --remove-orphans

          # --- 6. Чекаємо, поки все стане healthy ------------------------------
          echo "--- чекаємо healthcheck'и (до 180 с)"
          deadline=\$(( \$(date +%s) + 180 ))
          while :; do
            unhealthy=\$(\$COMPOSE ps --format json \
              | jq -r 'select(.Health == "starting" or .Health == "unhealthy") | .Service' \
              | sort -u | tr '\n' ' ')
            [ -z "\$unhealthy" ] && break
            if [ "\$(date +%s)" -ge "\$deadline" ]; then
              echo "🔴 не піднялись: \$unhealthy"
              \$COMPOSE ps
              \$COMPOSE logs --tail=80 \$unhealthy
              exit 1
            fi
            sleep 5
          done

          # --- 7. Прибираємо старі образи, але НЕ ВСІ ---------------------------
          # 72 год — це запас на відкат: попередній образ мусить лежати локально,
          # інакше «швидкий відкат» перетвориться на «чекаємо, поки GHCR віддасть
          # 800 МБ». Саме тому тут filter, а не `docker system prune -af`.
          docker image prune -af --filter "until=72h" >/dev/null || true

          echo "✅ Деплой ${SHA} завершено"
          \$COMPOSE ps
          REMOTE

      - name: Димова перевірка ззовні
        env:
          SITE_URL: ${{ vars.SITE_URL || 'https://complex.ua' }}
        run: |
          set -euo pipefail
          echo "--- /healthz"
          curl -fsS --retry 5 --retry-delay 3 "${SITE_URL}/healthz" && echo

          # ФІД HOTLINE. Перевіряємо ВЛАСТИВІСТЬ МАРШРУТУ, а не свіжість файлу:
          # бот Hotline не ходить по 301/302 — він вважає фід недоступним, і через
          # 7 днів каталог знімається з майданчика (research/HOTLINE.md).
          # Тому curl БЕЗ -L (не йдемо за редіректом) і розбираємо код:
          #   200 → добре
          #   3xx → ПРОВАЛ: на шляху фіда з'явився редірект (www→apex, →/ua/, TLS…)
          #   404 → попередження: маршрут цілий, файл ще не згенеровано
          #         (нормально для першого деплою — далі його зробить beat)
          echo "--- /feeds/hotline.xml (маршрут не має редіректити)"
          code=$(curl -sS -o /dev/null -w '%{http_code}' "${SITE_URL}/feeds/hotline.xml")
          case "$code" in
            200) echo "фід OK (200)" ;;
            3??) echo "🔴 фід віддає ${code} — РЕДІРЕКТ на шляху фіда. Hotline такий фід не прийме."; exit 1 ;;
            404) echo "::warning::фід ще не згенеровано (404). Маршрут живий. Перевір: make feed" ;;
            *)   echo "🔴 фід віддає ${code}"; exit 1 ;;
          esac
