# =============================================================================
# pgBackRest — базовий конфіг (СЕКРЕТІВ ТУТ НЕМАЄ, файл лежить у git).
#
# Ключі, бакет і пароль шифрування дописуються в РАНТАЙМІ у
# /etc/pgbackrest/conf.d/40-repo.conf скриптом render-repo-config.sh
# (він читає їх з /run/secrets/* і з env). pgBackRest сам підхоплює conf.d.
#
# ⚠️ Ім'я станзи `nisa` зашите в заголовку секції нижче. Якщо міняєш
#    PGBACKREST_STANZA у .env — міняй і тут, інакше pgbackrest не знайде станзу.
#
# ⚠️ `nisa` — ІСТОРИЧНА назва проєкту (з 14.07.2026 проєкт зветься Complex). Станзу
#    свідомо НЕ перейменовано: станза — ідентичність бекап-репозиторію, і перейменування
#    робить усі наявні бекапи та WAL-архів невидимими (треба stanza-create + full backup).
# =============================================================================

[global]
# --- Репозиторій: ОКРЕМИЙ бакет R2 з ОКРЕМИМ токеном (ADR-019) --------------
# Це не бюрократія. Токен застосунку (R2_*) не має прав на цей бакет: якщо web
# або worker скомпрометують, зловмисник зносить медіа — але НЕ бекапи. Бекап,
# який видаляється тими ж ключами, що й дані, — це не бекап, а копія.
repo1-type=s3
repo1-path=/pgbackrest
repo1-s3-region=auto
# R2 не любить virtual-host style для довільних бакетів — ходимо path-style.
repo1-s3-uri-style=path

# --- Шифрування репозиторію -------------------------------------------------
# Бекап містить ПІБ, телефони, адреси й email усіх покупців. У чужому S3 він
# лежить зашифрованим; ключ (repo1-cipher-pass) — окремим docker secret.
# ⚠️ ВТРАТИШ ЦЕЙ ПАРОЛЬ — ВТРАТИШ БЕКАПИ. Копія — в офлайн-сховищі, не на VPS.
repo1-cipher-type=aes-256-cbc

# --- Ретеншн ----------------------------------------------------------------
# 4 повні (=4 тижні, full щонеділі) + diff між ними. WAL тримається рівно
# стільки, скільки потрібно найстарішому повному бекапу — pgBackRest прибирає
# його сам, вручну нічого чистити не треба.
repo1-retention-full=4
repo1-retention-diff=7

# --- Продуктивність ---------------------------------------------------------
compress-type=zst
compress-level=3
process-max=2
start-fast=y
# Контрольні суми сторінок звіряються на бекапі — тиха корупція диска
# виявиться ТУТ, а не через півроку при відновленні.
checksum-page=y

# --- Асинхронна архівація WAL (RPO ≈ 5 хв) ----------------------------------
archive-async=y
spool-path=/var/spool/pgbackrest

# ⚠️ КОМПРОМІС, який треба розуміти. Якщо R2 лежить, WAL накопичується в pg_wal
# і рано чи пізно ЗАПОВНЮЄ ДИСК → PostgreSQL зупиняється → лягає весь магазин.
# archive-push-queue-max каже: коли черга WAL перевищила 4 ГБ — ВІДКИДАЙ старі
# сегменти з попередженням, але дай базі жити.
# Ціна: діра в PITR (відновитись «на 14:32» за цей проміжок не вийде). Лікується
# найближчим повним бекапом. Вибір між «дірка в історії» і «магазин лежить» —
# на користь магазину, але ЛИШЕ тому, що поруч є алерт: pgbackrest пише
# WARNING у лог, а check-backup-fresh.sh переводить сервіс у unhealthy.
archive-push-queue-max=4GiB

# --- Логи -------------------------------------------------------------------
log-path=/var/log/pgbackrest
log-level-console=info
log-level-file=detail

# =============================================================================
# Станза = один кластер PostgreSQL.
# =============================================================================
[nisa]
pg1-path=/var/lib/postgresql/data
pg1-port=5432
# Ходимо в БД через unix-сокет (том pgsocket спільний з контейнером postgres) —
# не треба ні пароля, ні відкритого TCP-порту.
pg1-socket-path=/var/run/postgresql
pg1-user=postgres
